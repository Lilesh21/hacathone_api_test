name: API Test Suite
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1-5'   # Weekdays at 06:00 UTC
  workflow_dispatch:          # Manual trigger button in GitHub UI
jobs:
  postman-api-tests:
    name: Postman API Tests (Newman)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
          - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install Newman and reporters
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
      - name: Create reports directory
        run: mkdir -p reports
      - name: Run Phase 1 API Tests
        run: |
          newman run ./tests/phase1.postman_collection.json \
            -e ./tests/assessment-dev.postman_environment.json \
            --env-var 'baseUrl=${{ secrets.REQRES_BASE_URL }}' \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export ./reports/api-report.html \
            --reporter-htmlextra-title 'API Assessment Report' \
            --timeout-request 10000
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_number }}
          path: reports/api-report.html
          retention-days: 30
      - name: Print summary
        if: always()
        run: echo "Pipeline complete. Run number ${{ github.run_number }}. Check artifacts 
for HTML report."